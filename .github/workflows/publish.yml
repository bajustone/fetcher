name: Publish
on:
  push:
    tags: ['v*']

jobs:
  # Nothing publishes unless the full gate passes: lint, typecheck, tests,
  # build (incl. publint + arethetypeswrong), smoke, and tag/version
  # consistency.
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v$TAG does not match package.json version $VERSION"
            exit 1
          fi
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build
      - run: bun scripts/check-size.ts
      # Smoke on the engines floor, not whatever Node the runner ships.
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
      - run: node scripts/smoke.mjs

  publish-jsr:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC — generates JSR provenance automatically
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Sync version from package.json to jsr.json
        run: |
          VERSION=$(node -p "require('./package.json').version")
          jq --arg v "$VERSION" '.version = $v' jsr.json > jsr.tmp && mv jsr.tmp jsr.json
      - run: npx jsr publish --allow-dirty

  publish-npm:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm trusted publishing (OIDC) — provenance automatic
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
      # Requires a one-time trusted-publisher configuration on npmjs.com
      # (package settings → Trusted publishers → this repo + workflow).
      # The very first publish of a new package may need a manual
      # `npm publish` with a token; every subsequent release is tokenless.
      - run: npm publish --access public
